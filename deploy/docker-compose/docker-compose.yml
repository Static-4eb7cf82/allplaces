services:
  db:
    image: postgres:17-alpine
    container_name: allplaces-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: allplaces
      POSTGRES_USER: allplaces
      POSTGRES_PASSWORD: allplaces
    ports:
      - "5432:5432"
    volumes:
      - allplaces-db-data:/var/lib/postgresql/data
      - ../../apps/database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U allplaces -d allplaces"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../../apps/backend
      dockerfile: Dockerfile
    container_name: allplaces-backend
    restart: unless-stopped
    environment:
      PORT: 8081
      DATABASE_URL: postgres://allplaces:allplaces@db:5432/allplaces?sslmode=disable
      OVERPASS_URL: https://overpass-api.de/api/interpreter
    ports:
      - "8081:8081"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ../../apps/frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8081
    container_name: allplaces-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  allplaces-db-data:
